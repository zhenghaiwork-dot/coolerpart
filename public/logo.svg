<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Water droplet outline -->
  <path d="M64 12 C64 12 28 56 28 82 C28 102 44 116 64 116 C84 116 100 102 100 82 C100 56 64 12 64 12Z"
        fill="none" stroke="#0d9488" stroke-width="5" stroke-linejoin="round"/>
  <!-- Gear inside droplet -->
  <g transform="translate(64,78)">
    <!-- Gear body -->
    <circle r="18" fill="#0f172a"/>
    <!-- Gear teeth -->
    <rect x="-3.5" y="-25" width="7" height="10" rx="1.5" fill="#0f172a"/>
    <rect x="-3.5" y="-25" width="7" height="10" rx="1.5" fill="#0f172a" transform="rotate(45)"/>
    <rect x="-3.5" y="-25" width="7" height="10" rx="1.5" fill="#0f172a" transform="rotate(90)"/>
    <rect x="-3.5" y="-25" width="7" height="10" rx="1.5" fill="#0f172a" transform="rotate(135)"/>
    <rect x="-3.5" y="-25" width="7" height="10" rx="1.5" fill="#0f172a" transform="rotate(180)"/>
    <rect x="-3.5" y="-25" width="7" height="10" rx="1.5" fill="#0f172a" transform="rotate(225)"/>
    <rect x="-3.5" y="-25" width="7" height="10" rx="1.5" fill="#0f172a" transform="rotate(270)"/>
    <rect x="-3.5" y="-25" width="7" height="10" rx="1.5" fill="#0f172a" transform="rotate(315)"/>
    <!-- Center hole -->
    <circle r="7" fill="#fff"/>
  </g>
  <style>
    @media (prefers-color-scheme: dark) {
      path { stroke: #2dd4bf; }
      g circle:first-child, g rect { fill: #e2e8f0; }
      g circle:last-child { fill: #0f172a; }
    }
  </style>
</svg>
